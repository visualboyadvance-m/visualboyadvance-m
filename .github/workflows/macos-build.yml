name: macOS Latest
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        build_type: [release, debug]
        build_options: [default, link_off, translations_only, libretro]
        include:
          - cmake_build: '-DCMAKE_BUILD_TYPE=Release'
            build_type: release
          - cmake_build: '-DCMAKE_BUILD_TYPE=Debug'
            build_type: debug
          - cmake_options: '-DENABLE_LINK=OFF'
            build_options: link_off
          - cmake_options: '-DTRANSLATIONS_ONLY=ON'
            build_options: translations_only
          - libretro_build: 'DEBUG=0'
            build_type: release
            build_options: libretro
          - libretro_build: 'DEBUG=1'
            build_type: debug
            build_options: libretro
        exclude:
          # Exclude debug/translations_only build
          - build_type: debug
            build_options: translations_only
    runs-on: macos-latest
    env:
      NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM: 1

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with: 
          submodules: recursive
      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Ensure Docker is available — CMake's auto-fetch path runs the
      # official `devkitpro/devkitarm` image to build mGBA's suite.gba
      # from source. macOS GHA runners do NOT ship Docker; we install
      # Colima (a Docker-compatible VM runtime that doesn't require
      # the licensed Docker Desktop) via Homebrew, which is itself
      # preinstalled on the runner.
      - if: matrix.build_options == 'default'
        name: Ensure Docker is installed
        run: |
          set -e
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            echo "docker already installed: $(docker --version)"
          else
            brew install docker docker-compose colima
            colima start
            # The docker CLI from brew expects DOCKER_HOST pointing at
            # colima's socket; export for subsequent steps.
            echo "DOCKER_HOST=unix://$HOME/.colima/default/docker.sock" >> "$GITHUB_ENV"
          fi
          docker pull devkitpro/devkitarm

      # Cmake build. The default-options matrix turns on
      # VBAM_FETCH_TEST_ROMS — CMake clones Blargg gb-test-roms and
      # mGBA's suite source from upstream, then builds suite.gba via
      # the official `devkitpro/devkitarm` Docker image (same path
      # mGBA's own docker-build.sh uses). If Docker isn't available
      # on this runner the gba.suite test gracefully skips; gb.blargg
      # always works since gb-test-roms ships prebuilt .gb files.
      - if: matrix.build_options != 'libretro'
        name: Configure CMake
        run: >-
          nix-shell --command 'cmake -B build -G Ninja
          ${{ matrix.cmake_build }} -DENABLE_LTO=OFF
          ${{ matrix.cmake_options }}
          ${{ matrix.build_options == 'default' && '-DVBAM_FETCH_TEST_ROMS=ON' || '' }}'
      - if: matrix.build_options != 'libretro'
        name: Build
        run: >-
          nix-shell --command 'ninja -C build'

      # Libretro build
      - if: matrix.build_options == 'libretro'
        name: Build libretro core
        run: >-
          nix-shell --command 'make -C src/libretro ${{ matrix.libretro_build }}'

      # Run tests
      - if: matrix.build_options == 'default'
        name: Run tests
        run: >-
          nix-shell --command 'cd build && ctest -j --output-on-failure'

