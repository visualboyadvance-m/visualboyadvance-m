name: macOS Latest
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        build_type: [release, debug]
        build_options: [default, link_off, translations_only]
        include:
          - cmake_build: '-DCMAKE_BUILD_TYPE=Release'
            build_type: release
          - cmake_build: '-DCMAKE_BUILD_TYPE=Debug'
            build_type: debug
          - cmake_options: '-DENABLE_SDL=ON -DENABLE_LIBRETRO=ON'
            build_options: default
          - cmake_options: '-DENABLE_LINK=OFF -DENABLE_SDL=ON -DENABLE_LIBRETRO=ON'
            build_options: link_off
          - cmake_options: '-DTRANSLATIONS_ONLY=ON'
            build_options: translations_only
        exclude:
          # Exclude debug/translations_only build
          - build_type: debug
            build_options: translations_only
    runs-on: macos-latest
    env:
      NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM: 1

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with: 
          submodules: recursive
      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Best-effort attempt to make Docker available — CMake's
      # auto-fetch path uses the official `devkitpro/devkitarm` image
      # to build mGBA's suite.gba from source for the gba.suite CTest
      # entry. macOS GHA runners do NOT ship Docker; we try Colima
      # (Docker-compatible VM runtime, no Docker Desktop license
      # needed), but it requires nested-VZ support which is flaky on
      # the GHA macOS hosts. If Docker can't come up the gba.suite
      # test gracefully skips at configure time — gb.blargg still
      # runs since gb-test-roms ships prebuilt .gb files.
      - if: matrix.build_options == 'default'
        name: Ensure Docker is installed (best-effort)
        continue-on-error: true
        run: |
          set +e
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            echo "docker already installed: $(docker --version)"
          else
            brew install docker docker-compose colima || exit 0
            colima start --vm-type=qemu || colima start || {
                echo "::warning::colima could not start a VM on this runner — gba.suite will be skipped"
                exit 0
            }
            echo "DOCKER_HOST=unix://$HOME/.colima/default/docker.sock" >> "$GITHUB_ENV"
          fi
          docker pull devkitpro/devkitarm || \
              echo "::warning::devkitpro/devkitarm pull failed — gba.suite will be skipped"

      # Cmake build. The default-options matrix turns on
      # VBAM_FETCH_TEST_ROMS — CMake clones Blargg gb-test-roms and
      # mGBA's suite source from upstream, then builds suite.gba via
      # the official `devkitpro/devkitarm` Docker image (same path
      # mGBA's own docker-build.sh uses). If Docker isn't available
      # on this runner the gba.suite test gracefully skips; gb.blargg
      # always works since gb-test-roms ships prebuilt .gb files.
      - name: Configure CMake
        run: >-
          nix-shell --command 'cmake -B build -G Ninja
          ${{ matrix.cmake_build }} -DENABLE_LTO=OFF
          ${{ matrix.cmake_options }}
          ${{ matrix.build_options == 'default' && '-DVBAM_FETCH_TEST_ROMS=ON' || '' }}'
      - name: Build
        run: >-
          nix-shell --command 'ninja -C build'

      # Run tests
      - if: matrix.build_options == 'default'
        name: Run tests
        run: >-
          nix-shell --command 'cd build && ctest -j --output-on-failure'

