name: Ubuntu Latest
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        build_compiler: [gcc, clang]
#        build_compiler: [gcc]
        build_type: [release, debug]
        build_options: [default, link_off, translations_only]
        include:
          - cmake_compiler: '-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++'
            build_compiler: gcc
          - cmake_compiler: '-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++'
            build_compiler: clang
          - cmake_build: '-DCMAKE_BUILD_TYPE=Release'
            build_type: release
          - cmake_build: '-DCMAKE_BUILD_TYPE=Debug'
            build_type: debug
          - cmake_options: '-DENABLE_SDL=ON -DENABLE_LIBRETRO=ON'
            build_options: default
          - cmake_options: '-DENABLE_LINK=OFF -DENABLE_SDL=ON -DENABLE_LIBRETRO=ON'
            build_options: link_off
          - cmake_options: '-DTRANSLATIONS_ONLY=ON'
            build_options: translations_only
        exclude:
          # Exclude debug/translations_only build
          - build_type: debug
            build_options: translations_only
          - build_type: release
            build_options: translations_only
            build_compiler: clang
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Capture the Ubuntu codename into the workflow env context so
      # cache keys can include it. The runner sets ImageOS / lsb_release
      # in the *process* environment, but ${{ env.X }} only reads from
      # workflow-defined env or values pushed via $GITHUB_ENV, so we
      # have to bridge it explicitly. Result: env.UBUNTU_CODENAME is
      # "noble" today and flips automatically when GitHub bumps
      # ubuntu-latest to plucky / resolute / whatever's next.
      - name: Detect Ubuntu codename
        run: echo "UBUNTU_CODENAME=$(lsb_release -cs)" >> "$GITHUB_ENV"

      # Cache /var/cache/apt/archives across runs. apt downloads .debs
      # to this directory and consults it before fetching from the
      # network, so a populated cache turns most of installdeps' apt
      # work into local file reads — useful for shaving the 30–60s
      # archive.ubuntu.com fetch off otherwise-healthy runs. Keyed on
      # the Ubuntu codename so each release gets its own cache pool;
      # when GitHub bumps ubuntu-latest to a new release, the noble
      # caches become unreachable from new-codename jobs and evict
      # cleanly after 7 days unused. The installdeps hash invalidates
      # the key whenever the script itself changes (new dep added,
      # version pin moved, etc.). The dedicated SDL3 cache below is
      # separate from this one and is gated on the noble-only PPA
      # branch, so it doesn't contaminate cross-release pools.
      - name: Cache apt archives
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ env.UBUNTU_CODENAME }}-${{ hashFiles('installdeps') }}-v1
          restore-keys: |
            apt-${{ env.UBUNTU_CODENAME }}-

      # All apt-related setup in one step: retry config, SDL3 source
      # probing, PPA registration. Outputs drive the cache restore key
      # below and the install logic further down. Internal `::group::`
      # markers create collapsible sections in the GHA log so this
      # remains debuggable despite being one step.
      - name: Resolve SDL3 source and configure apt
        id: sdl3_meta
        run: |
          # 10 retries with 120s timeouts gives ~20 min of tolerance for
          # a degraded Launchpad CDN. Real-world failures have been
          # TCP-connect timeouts on ppa.launchpadcontent.net lasting
          # 2–10 minutes. Every apt invocation in the job picks this up
          # automatically (including the ones inside installdeps).
          echo "::group::Configure APT retries"
          sudo tee /etc/apt/apt.conf.d/80-vbam-retries >/dev/null <<'EOF'
          Acquire::Retries "10";
          Acquire::Retries::Delay "true";
          Acquire::http::Timeout "120";
          Acquire::https::Timeout "120";
          EOF
          echo "::endgroup::"

          # SDL3 lives in main on Ubuntu 25.04+ (plucky/resolute).
          # On 24.04 LTS (noble) it isn't there, so we fall back through
          # a chain: PPA → cached debs → stale cached debs → SDL2.
          echo "::group::Probe for SDL3 in official sources"
          if apt-cache show libsdl3-dev >/dev/null 2>&1; then
            echo "::notice::SDL3 available in official archive; skipping PPA"
            echo "official_available=true" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "ppa_reachable=false" >> "$GITHUB_OUTPUT"
            echo "::endgroup::"
            exit 0
          fi
          echo "official_available=false" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

          # add-apt-repository runs `apt update` itself, so a separate
          # update isn't needed. apt-cache madison probes the candidate
          # version; an empty result means the PPA's Packages index
          # never landed (Launchpad index fetch failed even with
          # retries). We don't `set -e` out on PPA failures — the
          # `if ... ; then ... else ... fi` constructs handle them, and
          # downstream steps fall through to cache-only or SDL2.
          echo "::group::Add hrzhu/sdl3-backport PPA and probe version"
          if sudo add-apt-repository -y ppa:hrzhu/sdl3-backport; then
            ver=$(apt-cache madison libsdl3-dev 2>/dev/null \
                    | awk '/launchpadcontent/ {print $3; exit}')
            if [ -n "$ver" ]; then
              echo "::notice::PPA reachable; libsdl3-dev=$ver"
              echo "version=$ver" >> "$GITHUB_OUTPUT"
              echo "ppa_reachable=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::PPA source added but apt-cache madison empty (Launchpad index fetch failed)"
              echo "version=unknown" >> "$GITHUB_OUTPUT"
              echo "ppa_reachable=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::warning::add-apt-repository failed; Launchpad unreachable"
            echo "version=unknown" >> "$GITHUB_OUTPUT"
            echo "ppa_reachable=false" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

      # Restore the SDL3 deb cache. Exact-key match when the probe
      # found a specific version; restore-keys fall back to ANY prior
      # sdl3-noble-* entry — that's the mechanism that makes the
      # "Launchpad down + we have an old cache" path work, since the
      # exact key (sdl3-noble-unknown) won't match anything but the
      # prefix-fallback will pull the most-recent cache available.
      - if: steps.sdl3_meta.outputs.official_available == 'false'
        name: Restore SDL3 deb cache
        id: sdl3_cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/sdl3-debs
          key: sdl3-noble-${{ steps.sdl3_meta.outputs.version }}
          restore-keys: |
            sdl3-noble-

      # All install work in one step: download SDL3 fresh if needed,
      # install SDL3 from cache or fall back to SDL2, run installdeps,
      # add clang for clang matrix, install xvfb, then dedup and chown
      # for the post-job cache save. Keeping it consolidated minimizes
      # GHA UI clutter; `::group::` markers give debuggable structure
      # in the log.
      - name: Install dependencies
        run: |
          # Download fresh debs from the PPA only when (a) the PPA is
          # reachable AND (b) we don't have an exact-key cache hit.
          # Fuzzy restore-keys hits also pass this guard so a newer PPA
          # upload supersedes an older cached version cleanly.
          if [ "${{ steps.sdl3_meta.outputs.official_available }}" = "false" ] && \
             [ "${{ steps.sdl3_meta.outputs.ppa_reachable }}" = "true" ] && \
             [ "${{ steps.sdl3_cache.outputs.cache-hit }}" != "true" ]; then
            echo "::group::Download SDL3 debs from PPA"
            mkdir -p /tmp/sdl3-debs
            sudo apt-get install -y --download-only libsdl3-dev libsdl3-0
            sudo cp /var/cache/apt/archives/libsdl3*.deb /tmp/sdl3-debs/
            sudo chown -R "$USER" /tmp/sdl3-debs
            echo "::endgroup::"
          fi

          # Install SDL3 from whatever we have, OR commit to SDL2 fallback.
          # The five outcome strings map to distinct annotations so the
          # path taken is obvious from the run summary alone.
          echo "::group::Install SDL3 or commit to SDL2 fallback"
          if [ "${{ steps.sdl3_meta.outputs.official_available }}" = "true" ]; then
            echo "::notice::SDL3/SDL2 outcome: sdl3_official (will install via installdeps from official archive)"
            FALLBACK=false
          elif [ -d /tmp/sdl3-debs ] && ls /tmp/sdl3-debs/*.deb >/dev/null 2>&1; then
            if [ "${{ steps.sdl3_meta.outputs.ppa_reachable }}" = "false" ]; then
              echo "::warning::SDL3/SDL2 outcome: sdl3_cached_stale — Launchpad unreachable, installing from cache (may be older than current PPA)"
            elif [ "${{ steps.sdl3_cache.outputs.cache-hit }}" = "true" ]; then
              echo "::notice::SDL3/SDL2 outcome: sdl3_cached_exact (version ${{ steps.sdl3_meta.outputs.version }})"
            else
              echo "::notice::SDL3/SDL2 outcome: sdl3_fresh (downloaded ${{ steps.sdl3_meta.outputs.version }} from PPA)"
            fi
            sudo dpkg -i /tmp/sdl3-debs/*.deb || sudo apt-get install -f -y
            # Dedup: remove SDL3 .debs from the general apt-archives
            # cache. They live in the dedicated sdl3-noble-* cache via
            # /tmp/sdl3-debs. Removing them from /var/cache/apt/archives
            # keeps them out of the apt-${ImageOS}-* snapshot. Also
            # catches stale libsdl3*.deb pulled in from a prior
            # general-cache restore, which self-cleans over a few runs.
            sudo rm -f /var/cache/apt/archives/libsdl3*.deb
            FALLBACK=false
          else
            echo "::warning::SDL3/SDL2 outcome: sdl2_fallback — SDL3 UNAVAILABLE from all sources"
            echo "::warning::  official archive: no libsdl3-dev"
            echo "::warning::  PPA reachable: ${{ steps.sdl3_meta.outputs.ppa_reachable }}"
            echo "::warning::  cache: empty (no prior successful run to restore from)"
            echo "::warning::Build will compile against SDL2 instead of SDL3."
            # Remove the PPA source file so installdeps' apt-cache
            # search returns empty for libsdl3-dev and triggers its
            # built-in SDL2 codepath. Without this the source file is
            # still present (just with no metadata) and installdeps
            # may behave inconsistently.
            sudo rm -f /etc/apt/sources.list.d/hrzhu-ubuntu-sdl3-backport-noble.sources
            sudo apt-get update -qq || true
            FALLBACK=true
          fi
          echo "::endgroup::"

          # installdeps does its own SDL3-vs-SDL2 detection via
          # apt-cache search. The branches above leave the apt
          # environment in the state that makes its decision correct
          # in each path: official has libsdl3-dev visible; PPA paths
          # have it pre-installed via dpkg -i; SDL2-fallback has the
          # PPA source removed so apt-cache returns empty.
          echo "::group::installdeps + clang + xvfb"
          if [ "$FALLBACK" = "true" ]; then
            echo "::warning::SDL2 FALLBACK ACTIVE — see prior warnings for cause"
          fi
          bash installdeps
          if [ "${{ matrix.build_compiler }}" = clang ]; then
            sudo apt -y install clang
          fi
          sudo apt -y install xvfb
          echo "::endgroup::"

          # Make /var/cache/apt/archives readable to the runner user
          # before the post-job actions/cache save fires. apt sets
          # `lock` and `partial/` to _apt:root with restrictive modes
          # (0640 / 0700) which the unprivileged tar in the cache
          # action can't read, causing the entire save to fail with
          # exit 2 even though the .deb files themselves are
          # world-readable. apt re-asserts its own ownership on the
          # next install, so this is a one-shot prep for the snapshot.
          echo "::group::Prep apt-archives for post-job cache save"
          sudo chown -R "$USER:$USER" /var/cache/apt/archives
          echo "::endgroup::"

      # Save the SDL3 deb cache only when we just downloaded a fresh,
      # version-specific set of debs. Skipped when the restore was an
      # exact-key hit (already cached under the right key) and when
      # the PPA was unreachable (would create a bogus entry under the
      # "unknown" sentinel).
      - if: steps.sdl3_meta.outputs.official_available == 'false' && steps.sdl3_meta.outputs.ppa_reachable == 'true' && steps.sdl3_cache.outputs.cache-matched-key != format('sdl3-noble-{0}', steps.sdl3_meta.outputs.version)
        name: Save SDL3 deb cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/sdl3-debs
          key: sdl3-noble-${{ steps.sdl3_meta.outputs.version }}


      # Ensure Docker is available — CMake's auto-fetch path runs the
      # official `devkitpro/devkitarm` image to build mGBA's suite.gba
      # from source. Ubuntu GHA runners almost always have Docker
      # pre-installed; this step is a no-op when it's already present
      # and only installs from the official Docker apt repo otherwise.
      - if: matrix.build_options == 'default'
        name: Ensure Docker is installed
        run: |
          set -e
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            echo "docker already installed: $(docker --version)"
          else
            curl -fsSL https://get.docker.com | sudo sh
          fi
          # Pre-pull the toolchain image to avoid timing-out during
          # configure (it's ~700 MB on first pull).
          sudo docker pull devkitpro/devkitarm

      # CMake build. The default-options matrix turns on
      # VBAM_FETCH_TEST_ROMS — CMake clones Blargg gb-test-roms and
      # mGBA's suite source from upstream, then builds suite.gba
      # using the official `devkitpro/devkitarm` Docker image (same
      # invocation mGBA's own docker-build.sh uses). Ubuntu GHA
      # runners ship Docker pre-installed, so this works without
      # extra setup; if Docker is missing the gba.suite test skips
      # gracefully and gb.blargg still runs (its ROMs are prebuilt).
      -
        name: Configure CMake
        run: >-
          cmake -B build -G Ninja
          ${{ matrix.cmake_compiler }}
          ${{ matrix.cmake_build }}
          ${{ matrix.cmake_options }}
          ${{ matrix.build_options == 'default' && '-DVBAM_FETCH_TEST_ROMS=ON' || '' }}
      -
        name: Build
        run: ninja -C build
      -
        name: Install
        run: sudo ninja -C build install

      # Run tests
      - if: matrix.build_options == 'default'
        name: Run tests
        run: cd build && xvfb-run ctest -j --output-on-failure

