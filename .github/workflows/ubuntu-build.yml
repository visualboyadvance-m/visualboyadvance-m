name: Ubuntu Latest
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        build_compiler: [gcc, clang]
        build_type: [release, debug]
#        build_options: [default, link_off, translations_only, libretro]
        build_options: [default, link_off, translations_only]
        include:
          - cmake_compiler: '-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++'
            build_compiler: gcc
          - cmake_compiler: '-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++'
            build_compiler: clang
          - cmake_build: '-DCMAKE_BUILD_TYPE=Release'
            build_type: release
          - cmake_build: '-DCMAKE_BUILD_TYPE=Debug'
            build_type: debug
          - cmake_options: '-DENABLE_LINK=OFF'
            build_options: link_off
          - cmake_options: '-DTRANSLATIONS_ONLY=ON'
            build_options: translations_only
#          - libretro_build: 'DEBUG=0'
#            build_type: release
#            build_options: libretro
#          - libretro_build: 'DEBUG=1'
#            build_type: debug
#            build_options: libretro
        exclude:
          # Exclude debug/translations_only build
          - build_type: debug
            build_options: translations_only
          - build_type: release
            build_options: translations_only
            build_compiler: clang
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Configure apt-level retries upfront — every apt invocation in the
      # job picks these up automatically (including the ones inside
      # installdeps). 10 retries with 120s timeouts gives ~20 min of
      # tolerance for a degraded Launchpad CDN before declaring a fetch
      # dead. Real-world failure modes have been TCP-connect timeouts on
      # ppa.launchpadcontent.net (185.125.190.80) lasting 2–10 minutes.
      - name: Configure APT retries
        run: |
          sudo tee /etc/apt/apt.conf.d/80-vbam-retries >/dev/null <<'EOF'
          Acquire::Retries "10";
          Acquire::Retries::Delay "true";
          Acquire::http::Timeout "120";
          Acquire::https::Timeout "120";
          EOF

      # Cache /var/cache/apt/archives across runs. apt downloads .debs
      # to this directory and consults it before fetching from the
      # network, so a populated cache turns most of installdeps' apt
      # work into local file reads — useful for shaving the 30–60s
      # archive.ubuntu.com fetch off otherwise-healthy runs. Keyed on
      # ImageOS (e.g. "ubuntu24") so each Ubuntu release gets its own
      # cache pool; when GitHub bumps ubuntu-latest from 24 to 26, the
      # noble caches become unreachable from resolute jobs and evict
      # cleanly after 7 days unused. The installdeps hash invalidates
      # the key whenever the script itself changes (new dep added,
      # version pin moved, etc.). The dedicated SDL3 cache below is
      # separate from this one and is gated on the noble-only PPA
      # branch, so it doesn't contaminate cross-release pools.
      - name: Cache apt archives
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ env.ImageOS }}-${{ hashFiles('installdeps') }}-v1
          restore-keys: |
            apt-${{ env.ImageOS }}-

      # SDL3 lives in main on Ubuntu 25.04 (plucky) and later. On 24.04
      # LTS (noble) it isn't there, so we fall back through a chain:
      # PPA → cached debs → stale cached debs → SDL2.
      - name: Probe for SDL3 in official sources
        id: sdl3_official
        run: |
          if apt-cache show libsdl3-dev >/dev/null 2>&1; then
            echo "::notice::SDL3 available in official archive; skipping PPA"
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      # Add the PPA when SDL3 isn't in main. add-apt-repository runs
      # `apt update` itself, so a separate update isn't needed.
      # continue-on-error lets us drop into the cache-only branch when
      # Launchpad is unreachable. apt-cache madison probes the candidate
      # version; an empty result means the PPA's Packages index never
      # landed (Launchpad index fetch failed even with retries).
      - if: steps.sdl3_official.outputs.available == 'false'
        name: Add hrzhu/sdl3-backport PPA and probe version
        id: sdl3_ppa
        continue-on-error: true
        run: |
          if sudo add-apt-repository -y ppa:hrzhu/sdl3-backport; then
            ver=$(apt-cache madison libsdl3-dev 2>/dev/null \
                    | awk '/launchpadcontent/ {print $3; exit}')
            if [ -n "$ver" ]; then
              echo "::notice::PPA reachable; libsdl3-dev=$ver"
              echo "version=$ver" >> "$GITHUB_OUTPUT"
              echo "reachable=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::PPA source added but apt-cache madison empty (Launchpad index fetch failed)"
              echo "version=unknown" >> "$GITHUB_OUTPUT"
              echo "reachable=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::warning::add-apt-repository failed; Launchpad unreachable"
            echo "version=unknown" >> "$GITHUB_OUTPUT"
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          fi

      # Restore the SDL3 deb cache. Exact-key match when the probe found
      # a specific version; restore-keys fall back to ANY prior
      # sdl3-noble-* entry — that's the mechanism that makes the
      # "Launchpad down + we have an old cache" path work, since the
      # exact key (sdl3-noble-unknown) won't match anything but the
      # prefix-fallback will pull the most-recent cache available.
      - if: steps.sdl3_official.outputs.available == 'false'
        name: Restore SDL3 deb cache
        id: sdl3_cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/sdl3-debs
          key: sdl3-noble-${{ steps.sdl3_ppa.outputs.version }}
          restore-keys: |
            sdl3-noble-

      # Download fresh debs from the PPA only when (a) the PPA is
      # reachable AND (b) we don't have an exact-key cache hit. Fuzzy
      # restore-keys hits also pass this guard so a newer PPA upload
      # supersedes an older cached version cleanly.
      - if: steps.sdl3_official.outputs.available == 'false' && steps.sdl3_ppa.outputs.reachable == 'true' && steps.sdl3_cache.outputs.cache-hit != 'true'
        name: Download SDL3 debs from PPA
        run: |
          mkdir -p /tmp/sdl3-debs
          sudo apt-get install -y --download-only libsdl3-dev libsdl3-0
          sudo cp /var/cache/apt/archives/libsdl3*.deb /tmp/sdl3-debs/
          sudo chown -R "$USER" /tmp/sdl3-debs

      # Save the cache only when we just downloaded a fresh,
      # version-specific set of debs. Skipped when the restore was an
      # exact-key hit (already cached under the right key) and when the
      # PPA was unreachable (would create a bogus entry under "unknown").
      - if: steps.sdl3_official.outputs.available == 'false' && steps.sdl3_ppa.outputs.reachable == 'true' && steps.sdl3_cache.outputs.cache-matched-key != format('sdl3-noble-{0}', steps.sdl3_ppa.outputs.version)
        name: Save SDL3 deb cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/sdl3-debs
          key: sdl3-noble-${{ steps.sdl3_ppa.outputs.version }}

      # Install SDL3 from whatever we have, OR commit to the SDL2
      # fallback. The four outcomes map onto distinct log messages so
      # the chosen path is obvious from the run summary.
      - name: Install SDL3 or commit to SDL2 fallback
        id: sdl3_status
        run: |
          if [ "${{ steps.sdl3_official.outputs.available }}" = "true" ]; then
            echo "::notice::SDL3 will install via installdeps from the official archive"
            echo "outcome=sdl3_official" >> "$GITHUB_OUTPUT"
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          elif [ -d /tmp/sdl3-debs ] && ls /tmp/sdl3-debs/*.deb >/dev/null 2>&1; then
            if [ "${{ steps.sdl3_ppa.outputs.reachable }}" = "false" ]; then
              echo "::warning::Launchpad unreachable — installing SDL3 from cached .debs (may be older than current PPA)"
              echo "outcome=sdl3_cached_stale" >> "$GITHUB_OUTPUT"
            elif [ "${{ steps.sdl3_cache.outputs.cache-hit }}" = "true" ]; then
              echo "::notice::installing SDL3 from cache (exact version match for ${{ steps.sdl3_ppa.outputs.version }})"
              echo "outcome=sdl3_cached_exact" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::installing SDL3 from freshly downloaded PPA debs (${{ steps.sdl3_ppa.outputs.version }})"
              echo "outcome=sdl3_fresh" >> "$GITHUB_OUTPUT"
            fi
            sudo dpkg -i /tmp/sdl3-debs/*.deb || sudo apt-get install -f -y
            # Dedup: SDL3 .debs are preserved in the dedicated sdl3-noble-*
            # cache via /tmp/sdl3-debs. Remove them from the general apt
            # archives directory so they're not duplicated into the
            # apt-${{ env.ImageOS }}-* cache too. installdeps' subsequent
            # apt-get install for libsdl3-dev becomes a no-op (package
            # already installed via dpkg above), so removing the .deb
            # from /var/cache/apt/archives doesn't trigger a re-fetch.
            # Also catches stale libsdl3*.deb pulled in from a prior
            # general-cache restore, which self-cleans over a few runs.
            sudo rm -f /var/cache/apt/archives/libsdl3*.deb
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::SDL3 UNAVAILABLE from all sources — falling back to SDL2"
            echo "::warning::  official archive: no libsdl3-dev"
            echo "::warning::  PPA reachable: ${{ steps.sdl3_ppa.outputs.reachable }}"
            echo "::warning::  cache: empty (no prior successful run to restore from)"
            echo "::warning::Build will compile against SDL2 instead of SDL3."
            # Remove the PPA source file so installdeps' `apt-cache search
            # libsdl3-dev` returns empty and triggers its built-in SDL2
            # codepath. Without this the source file is still present
            # (just with no metadata) and installdeps may behave inconsistently.
            sudo rm -f /etc/apt/sources.list.d/hrzhu-ubuntu-sdl3-backport-noble.sources
            sudo apt-get update -qq || true
            echo "outcome=sdl2_fallback" >> "$GITHUB_OUTPUT"
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          fi

      # installdeps does its own SDL3-vs-SDL2 detection via apt-cache
      # search. In each path above we've left the apt environment in the
      # state that makes its decision correct:
      #   - sdl3_official: apt-cache shows libsdl3-dev → SDL3 install path.
      #   - sdl3_cached_*/sdl3_fresh: libsdl3-dev already installed via
      #     dpkg -i, PPA in apt sources, apt-cache shows it → SDL3 path,
      #     and the install becomes a no-op for the lib itself.
      #   - sdl2_fallback: PPA source removed, apt-cache empty for
      #     libsdl3-dev → installdeps cleanly takes the SDL2 branch.
      - name: Install remaining dependencies
        run: |
          echo "::notice::SDL3/SDL2 outcome: ${{ steps.sdl3_status.outputs.outcome }}"
          if [ "${{ steps.sdl3_status.outputs.fallback }}" = "true" ]; then
            echo "::warning::SDL2 FALLBACK ACTIVE — see prior warnings for cause"
          fi
          bash installdeps
          if [ "${{ matrix.build_compiler }}" = clang ]; then
            sudo apt -y install clang
          fi

      # De-duplicate the SDL3 .debs out of the general apt-archives
      # cache. They live in the dedicated sdl3-noble-* cache (which is
      # the resilient fallback when Launchpad is down); having them
      # also captured in the general apt-${ImageOS}-* cache snapshot
      # wastes a few MB per entry across all branches and contributes
      # to the 10 GB repo cache cap. The post-job actions/cache save
      # snapshots /var/cache/apt/archives at job-end, so deleting here
      # — after installdeps has already consumed them — keeps them out
      # of the snapshot without affecting this run.
      - name: Drop SDL3 debs from general apt cache (deduplication)
        run: sudo rm -f /var/cache/apt/archives/libsdl3*.deb

      - name: Install xvfb
        run: sudo apt -y install xvfb

      # Ensure Docker is available — CMake's auto-fetch path runs the
      # official `devkitpro/devkitarm` image to build mGBA's suite.gba
      # from source. Ubuntu GHA runners almost always have Docker
      # pre-installed; this step is a no-op when it's already present
      # and only installs from the official Docker apt repo otherwise.
      - if: matrix.build_options == 'default'
        name: Ensure Docker is installed
        run: |
          set -e
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            echo "docker already installed: $(docker --version)"
          else
            curl -fsSL https://get.docker.com | sudo sh
          fi
          # Pre-pull the toolchain image to avoid timing-out during
          # configure (it's ~700 MB on first pull).
          sudo docker pull devkitpro/devkitarm

      # CMake build. The default-options matrix turns on
      # VBAM_FETCH_TEST_ROMS — CMake clones Blargg gb-test-roms and
      # mGBA's suite source from upstream, then builds suite.gba
      # using the official `devkitpro/devkitarm` Docker image (same
      # invocation mGBA's own docker-build.sh uses). Ubuntu GHA
      # runners ship Docker pre-installed, so this works without
      # extra setup; if Docker is missing the gba.suite test skips
      # gracefully and gb.blargg still runs (its ROMs are prebuilt).
      - if: matrix.build_options != 'libretro'
        name: Configure CMake
        run: >-
          cmake -B build -G Ninja
          ${{ matrix.cmake_compiler }}
          ${{ matrix.cmake_build }}
          ${{ matrix.cmake_options }}
          ${{ matrix.build_options == 'default' && '-DVBAM_FETCH_TEST_ROMS=ON' || '' }}
      - if: matrix.build_options != 'libretro'
        name: Build
        run: ninja -C build
      - if: matrix.build_options != 'libretro'
        name: Install
        run: sudo ninja -C build install

      # Libretro build
#      - if: matrix.build_options == 'libretro'
#        name: Build libretro core
#        run: make -C src/libretro ${{ matrix.libretro_build }}

      # Run tests
      - if: matrix.build_options == 'default'
        name: Run tests
        run: cd build && xvfb-run ctest -j --output-on-failure